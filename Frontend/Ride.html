<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uber Ride Clone</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="Ride.css">
</head>
<body>

  <!-- Header -->
  <header class="navbar">
    <div class="nav-container">

      <div class="nav-left">
        <div class="logo">Uber</div>

        <nav class="nav-menu">
          <a href="#" class="active">
            <i class="fa-solid fa-car"></i>
            Ride
          </a>

          <a href="#">
            <i class="fa-solid fa-key"></i>
            Rent
          </a>
        </nav>
      </div>

      <div class="nav-right">
        <a href="#" class="login">
          <i class="fa-solid fa-user"></i>
          Login
        </a>

        <a href="#" class="signup">
          Sign up
        </a>
      </div>

    </div>
  </header>

  <!-- Main -->
  <section class="ride-section">

    <!-- Booking Card -->
    <div class="ride-card">

      <h1>Get a ride</h1>

      <div class="input-box">
        <i class="fa-solid fa-circle-dot"></i>
        <input type="text" placeholder="Pickup location">
      </div>

      <div class="input-box">
        <i class="fa-solid fa-square"></i>
        <input type="text" placeholder="Dropoff location">
      </div>

      <div class="input-box dropdown">
        <div class="left-content">
          <i class="fa-regular fa-clock"></i>
          <span>Pickup now</span>
        </div>

        <i class="fa-solid fa-angle-down"></i>
      </div>

      <div class="passenger-select">
        <i class="fa-solid fa-user"></i>
        <span>For me</span>
        <i class="fa-solid fa-angle-down"></i>
      </div>

      <button class="search-btn">
        Search
      </button>

    </div>

    <!-- Map -->
    <div class="map-container">

      <img
        src="https://maps.googleapis.com/maps/api/staticmap?center=Haridwar&zoom=13&size=1200x800&maptype=roadmap"
        alt="Map">

      <div class="zoom-controls">
        <button>+</button>
        <button>−</button>
      </div>

    </div>

  </section>

</body>
</html>
