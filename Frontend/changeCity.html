<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
     <div class="overlay">
    <div class="city-modal">

      <div class="modal-header">
        <h2>You are currently in Bhopal</h2>
        <i class="fa-solid fa-xmark close-btn"></i>
      </div>

      <button class="explore-btn">Explore city</button>

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Change city">
      </div>

      <h3 class="popular-title">Popular</h3>

      <div class="city-list">
        <div class="city-item">🇫🇷 Paris</div>
        <div class="city-item">🇧🇷 Rio De Janeiro</div>
        <div class="city-item">🇺🇸 New York City</div>
        <div class="city-item">🇮🇳 Delhi NCR</div>
      </div>
</body>
</html>
