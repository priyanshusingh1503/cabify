<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Courier Clone</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">Uber</div>

        <div class="nav-links">
            <a href="#"><i class="fas fa-car"></i> Ride</a>
            <a href="#"><i class="fas fa-key"></i> Rent</a>
        </div>

        <div class="auth">
            <a href="#">Login</a>
            <button>Sign up</button>
        </div>
    </header>

    <!-- Main Section -->
    <div class="container">

        <!-- Left Panel -->
        <div class="sidebar">

            <img src="image10.jpg"
                alt="Courier">

            <h1>Courier</h1>

            <p>
                Have a courier deliver something for you. Get packages
                delivered in the time it takes to drive there.
            </p>

            <div class="tabs">
                <button class="active">Send</button>
                <button>Receive</button>
            </div>

            <div class="input-box">
                <i class="fas fa-circle-dot"></i>
                <span>Choose sender's location</span>
            </div>

            <div class="input-box">
                <i class="fas fa-square"></i>
                <span>Choose recipient's location</span>
            </div>

            <button class="search-btn">Search</button>

        </div>

        <!-- Map Section -->
        <div class="map-container">
            <iframe
                src="https://maps.google.com/maps?q=nagpur&t=&z=11&ie=UTF8&iwloc=&output=embed"
                allowfullscreen>
            </iframe>
        </div>

    </div>

</body>
</html>
